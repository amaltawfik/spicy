url: https://amaltawfik.github.io/spicy/
template:
  bootstrap: 5
  light-switch: true
  math-rendering: mathjax
  bslib:
    info: "#4F4F52"
    base_font:
      google: {family: "Atkinson Hyperlegible", wght: [300, 400, 700], ital: [0, 1]}
    headings-color: "#2e2e2e"
    link-color: "#2e2e2e"
    link-decoration: underline dotted

navbar:
  structure:
    left: [intro, get-started, reference, articles, news]
    right: [search, lightswitch, github]
  components:
    intro:
      text: Home
      href: index.html
    reference:
      text: Reference
      href: reference/index.html
    news:
      text: News
      href: news/index.html
    get-started:
      text: Get started
      href: articles/spicy.html
    github:
      icon: fa-github
      aria-label: GitHub repository
      href: https://github.com/amaltawfik/spicy

articles:
