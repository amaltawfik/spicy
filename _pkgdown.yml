url: https://amaltawfik.github.io/spicy/

home:
  title: "spicy: frequency tables, cross-tabulations, and summary tables in R"
  description: >
    R package for frequency tables, cross-tabulations with chi-squared
    tests and effect sizes, association measures (Cramer's V, Phi,
    Gamma, Kendall's Tau-b, Somers' D), categorical and continuous
    summary tables, and interactive codebooks. A tidyverse-friendly
    alternative to SPSS and Stata for survey and social science data
    analysis.

template:
  bootstrap: 5
  light-switch: true
  math-rendering: mathjax
  bslib:
    info: "#4F4F52"
    base_font:
      google: {family: "Atkinson Hyperlegible", wght: [300, 400, 700], ital: [0, 1]}
    headings-color: "#2e2e2e"
    link-color: "#2e2e2e"
    link-decoration: underline dotted

navbar:
  structure:
    left: [intro, get-started, reference, articles, news]
    right: [search, lightswitch, github]
  components:
