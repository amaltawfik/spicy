url: https://amaltawfik.github.io/spicy/

home:
  title: "spicy: APA-style regression and summary tables for R"
  description: >
    R package for frequency tables, cross-tabulations with
    chi-squared tests and association measures (Cramer's V, Phi,
    Gamma, Kendall's Tau-b, Somers' D), categorical and continuous
    summary tables, model-based group comparisons for continuous
    outcomes, and publication-ready regression coefficient tables
    for one or more `lm` or `glm` fits side by side. All table
    outputs follow APA conventions, expose `broom`-compatible
    `tidy()` / `glance()` methods, and export to console, gt,
    tinytable, flextable, Excel, Word, or clipboard. A
    tidyverse-friendly alternative to SPSS and Stata for survey,
    social-science, and clinical reporting.

template:
  bootstrap: 5
  light-switch: true
  math-rendering: mathjax
  bslib:
    info: "#4F4F52"
    base_font:
      google: {family: "IBM Plex Sans", wght: [300, 400, 500, 600, 700], ital: [0, 1]}
    code_font:
      google: {family: "IBM Plex Mono", wght: [400, 500, 700], ital: [0, 1]}
    headings-color: "#2e2e2e"
    link-color: "#2e2e2e"
    link-decoration: underline dotted

